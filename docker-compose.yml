version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: addy-postgres
    environment:
      POSTGRES_DB: addy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d addy"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: addy-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: python:3.12-slim
    container_name: addy-api
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    image: python:3.12-slim
    container_name: addy-bot
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python run_bot.py"
    depends_on:
      api:
        condition: service_started

  dashboard:
    image: node:20-alpine
    container_name: addy-dashboard
    working_dir: /app/dashboard/nextjs-app
    env_file:
      - .env
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
